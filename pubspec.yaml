name: asa_server_eye
description: ARK SA Server Eye – real time server population tracker for ARK Survival Ascended.

publish_to: "none"

version: 0.1.6+6

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  flutter_riverpod: ^2.5.1

  dio: ^5.9.2
  equatable: ^2.0.8

  # Pinned for current compatibility work:
  # newer shared_preferences variants still trigger upstream KGP warnings,
  # but 2.5.5 is part of the currently verified working dependency set.
  shared_preferences: 2.5.5

  intl: ^0.20.2

  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0

  # Keep FlutterFire on the verified compatible set for now.
  # Do not bump these independently without revalidating the full stack.
  firebase_core: 4.6.0
  firebase_auth: 6.2.0
  cloud_firestore: 6.1.3
  firebase_messaging: 16.2.2

  # Intentionally pinned:
  # firebase_storage 13.4.1 failed to compile on Android in our current setup,
  # so we stay on 13.2.0 until the upstream/plugin compatibility issue is resolved.
  firebase_storage: 13.2.0

  google_mobile_ads: 8.0.0
  url_launcher: ^6.3.2
  flutter_launcher_icons: ^0.14.4
  in_app_purchase: ^3.2.3
  image_picker: ^1.2.1
  flutter_native_splash: ^2.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  build_runner: ^2.4.12
  freezed: ^3.2.5
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icons/app_icon4.png
  remove_alpha_ios: true
