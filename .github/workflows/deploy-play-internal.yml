name: Deploy to Google Play Internal

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-internal:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat <<EOF > android/key.properties
          storePassword=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          keyPassword=${{ secrets.ANDROID_KEY_PASSWORD }}
          keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}
          storeFile=app/upload-keystore.jks
          EOF

      - name: Flutter pub get
        run: flutter pub get

      - name: Build release AAB
        run: flutter build appbundle --release --build-number=${{ github.run_number }}

      - name: Write Google Play service account
        run: |
          cat <<'EOF' > play-service-account.json
          ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          EOF

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.2'

      - name: Install fastlane
        run: gem install fastlane

      - name: Upload to Google Play Internal
        run: |
          fastlane supply \
            --aab build/app/outputs/bundle/release/app-release.aab \
            --json_key play-service-account.json \
            --package_name com.jchillah.asaservereye \
            --track internal \
            --skip_upload_metadata true \
            --skip_upload_images true \
            --skip_upload_screenshots true \
            --release_status completed
